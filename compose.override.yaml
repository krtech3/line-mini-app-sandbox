services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./:/app:cached
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    command: air
    ports:
      - "8000:8000"
    depends_on:
      - db

  app-debug:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./:/app:cached
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      PORT: "8000"
    command: >
      dlv debug . --headless --listen=:2345 --api-version=2
      --accept-multiclient
      --build-flags="-gcflags=all=-N -l"
    ports:
      - "8000:8000"
      - "2345:2345"
    depends_on:
      - db
